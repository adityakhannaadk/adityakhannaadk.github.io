<div class="content">
<p class="has-line-data" data-line-start="0" data-line-end="1">I'm planning to add a lot more here, but for now here's a nice visualisation of a rotated surface code where you can add X and Z errors.</p>
<div id="surface-code-container" style="background:#000; padding:20px; border-radius:12px; max-width:600px; margin:auto;">
  <canvas id="surface-code-canvas" width="500" height="500" style="background:#000; display:block; margin:auto; border-radius:8px;"></canvas>
  <div style="text-align:center; margin-top:16px;">
    <span style="color:#38bdf8; font-size:16px;">Click a data qubit to toggle X (blue) or Z (purple) error:</span>
    <br>
    <button onclick="setErrorType('X')" style="background:#1e1b4b; color:#60a5fa; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">X Error</button>
    <button onclick="setErrorType('Z')" style="background:#134e4a; color:#38bdf8; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">Z Error</button>
    <button onclick="resetSurfaceCode()" style="background:#0f172a; color:#f59e42; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">Reset</button>
  </div>
</div>

<script>
const canvas = document.getElementById('surface-code-canvas');
const ctx = canvas.getContext('2d');
const d = 5; // distance of code (odd number)
const spacing = 70;
const offset = 60;
let errorType = 'X';

function setErrorType(type) { errorType = type; }
function resetSurfaceCode() { for (let q of dataQubits) q.error = null; drawSurfaceCode(); }

function getQubitColor(q) {
  if (q.error === 'X') return '#60a5fa';
  if (q.error === 'Z') return '#a78bfa';
  return '#222';
}

// ----------------------------
// Build rotated surface code
// ----------------------------

// Data qubits at vertices (all integer coordinates)
let dataQubits = [];
for (let i = 0; i <= d; i++) {
  for (let j = 0; j <= d; j++) {
    dataQubits.push({
      i, j,
      x: offset + j * spacing,
      y: offset + i * spacing,
      error: null
    });
  }
}

// Stabilizers at odd parity centers (including boundaries)
let stabilizers = [];
for (let i = 0; i <= d; i++) {
  for (let j = 0; j <= d; j++) {
    if ((i + j) % 2 === 1) {
      const type = (i % 2 === 1) ? 'X' : 'Z'; // alternating rows
      stabilizers.push({
        i, j,
        x: offset + j * spacing,
        y: offset + i * spacing,
        type,
        triggered: false
      });
    }
  }
}

// ----------------------------
// Syndrome calculation
// ----------------------------
function updateDetectionEvents() {
  for (let s of stabilizers) {
    let count = 0;
    for (let q of dataQubits) {
      // corners of plaquette are at Chebyshev distance 1
      if (Math.abs(q.i - s.i) === 1 && Math.abs(q.j - s.j) === 1) {
        if (q.error === 'X' && s.type === 'Z') count++;
        if (q.error === 'Z' && s.type === 'X') count++;
      }
    }
    s.triggered = count % 2 === 1;
  }
}

// ----------------------------
// Drawing
// ----------------------------
function drawSurfaceCode() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  updateDetectionEvents();

  // draw stabilizer plaquettes as squares
  for (let s of stabilizers) {
    ctx.beginPath();
    ctx.rect(s.x - spacing/2, s.y - spacing/2, spacing, spacing);
    if (s.type === 'X') {
      ctx.fillStyle = s.triggered ? "rgba(239,68,68,1)" : "rgba(239,68,68,0.3)";
    } else {
      ctx.fillStyle = s.triggered ? "rgba(34,211,238,1)" : "rgba(34,211,238,0.3)";
    }
    ctx.fill();
  }

  // draw data qubits at vertices
  for (let q of dataQubits) {
    ctx.beginPath();
    ctx.arc(q.x, q.y, 10, 0, 2*Math.PI);
    ctx.fillStyle = getQubitColor(q);
    ctx.shadowColor = q.error ? ctx.fillStyle : '#000';
    ctx.shadowBlur = q.error ? 8 : 0;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#444';
    ctx.stroke();
  }
}

// ----------------------------
// Interaction
// ----------------------------
canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (let q of dataQubits) {
    const dx = mx - q.x;
    const dy = my - q.y;
    if (dx*dx + dy*dy < 12*12) {
      q.error = (q.error === errorType) ? null : errorType;
      drawSurfaceCode();
      break;
    }
  }
});

drawSurfaceCode();
</script>
