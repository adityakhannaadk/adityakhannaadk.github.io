<div class="content">
<p class="has-line-data" data-line-start="0" data-line-end="1">I'm planning to add a lot more here, but for now here's a nice visualisation of a rotated surface code where you can add X and Z errors.</p>
<div id="surface-code-container" style="background:#000; padding:20px; border-radius:12px; max-width:600px; margin:auto;">
    <canvas id="surface-code-canvas" width="500" height="500" style="background:#111; display:block; margin:auto; border-radius:8px;"></canvas>
    <div style="text-align:center; margin-top:16px;">
        <span style="color:#a78bfa; font-size:16px;">Click a qubit to toggle X (blue) or Z (purple) error:</span>
        <br>
        <button onclick="setErrorType('X')" style="background:#1e1b4b; color:#60a5fa; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">X Error</button>
        <button onclick="setErrorType('Z')" style="background:#312e81; color:#a78bfa; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">Z Error</button>
        <button onclick="resetSurfaceCode()" style="background:#0f172a; color:#f59e42; border:none; padding:8px 16px; margin:8px; border-radius:6px; font-family:'Inconsolata',monospace;">Reset</button>
    </div>
</div>
<script>
const canvas = document.getElementById('surface-code-canvas');
const ctx = canvas.getContext('2d');
const n = 5; // 5x5 grid for rotated surface code
const spacing = 80;
const offset = 40;
let errorType = 'X';

function setErrorType(type) {
    errorType = type;
}

function resetSurfaceCode() {
    for (let i = 0; i < qubits.length; i++) {
        qubits[i].error = null;
    }
    drawSurfaceCode();
}

function getQubitColor(q) {
    if (q.error === 'X') return '#60a5fa'; // blue
    if (q.error === 'Z') return '#a78bfa'; // purple
    return '#222';
}

function getDetectionColor(d) {
    return d.triggered ? '#f59e42' : '#444'; // orange or dark
}

// Generate qubit positions for rotated surface code
let qubits = [];
for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
        if ((i + j) % 2 === 0) {
            qubits.push({i, j, x: offset + j * spacing, y: offset + i * spacing, error: null});
        }
    }
}

// Generate stabilizer positions (detection events)
let stabilizers = [];
for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
        if ((i + j) % 2 === 1) {
            stabilizers.push({i, j, x: offset + j * spacing, y: offset + i * spacing, triggered: false});
        }
    }
}

// Check detection events (simple parity check)
function updateDetectionEvents() {
    for (let s of stabilizers) {
        let count = 0;
        for (let q of qubits) {
            if (Math.abs(q.i - s.i) + Math.abs(q.j - s.j) === 1) {
                if (errorType === 'X' && q.error === 'X') count++;
                if (errorType === 'Z' && q.error === 'Z') count++;
            }
        }
        s.triggered = count % 2 === 1;
    }
}

function drawSurfaceCode() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw stabilizers (detection events)
    updateDetectionEvents();
    for (let s of stabilizers) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, 18, 0, 2 * Math.PI);
        ctx.fillStyle = getDetectionColor(s);
        ctx.shadowColor = s.triggered ? '#f59e42' : '#000';
        ctx.shadowBlur = s.triggered ? 10 : 0;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#222';
        ctx.stroke();
    }

    // Draw qubits
    for (let q of qubits) {
        ctx.beginPath();
        ctx.arc(q.x, q.y, 14, 0, 2 * Math.PI);
        ctx.fillStyle = getQubitColor(q);
        ctx.shadowColor = q.error === 'X' ? '#60a5fa' : (q.error === 'Z' ? '#a78bfa' : '#000');
        ctx.shadowBlur = q.error ? 8 : 0;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#444';
        ctx.stroke();
    }
}

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    for (let q of qubits) {
        const dx = mx - q.x;
        const dy = my - q.y;
        if (dx * dx + dy * dy < 16 * 16) {
            q.error = (q.error === errorType) ? null : errorType;
            drawSurfaceCode();
            break;
        }
    }
});

drawSurfaceCode();
</script>
